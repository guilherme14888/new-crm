# Stack de PREVIEW do redesign — UM ÚNICO serviço (imagem all-in-one new-crm).
# A imagem serve API + SPA na porta 3001 (NAO é nginx na 80). Isolada da produção.
#
# ⚠️ NUNCA use aqui o domínio de produção (sistema.br4licitacoes.com) nem as imagens
#    crm-api/crm-scrape-worker. Esta imagem ja contem tudo. E NAO suba ingest-worker:
#    com RUN_SCHEDULER=false este container nao roda ingestao (nao competir com a prod).
#
# Preencha <...>. Se usar ${VAR}, defina a VAR na secao "Environment variables" da
# stack no Portainer; ou troque por valor LITERAL entre aspas.
version: "3.8"

services:
  new-crm:
    image: guilherme1488/new-crm:latest
    environment:
      - NODE_ENV=production
      - PORT=3001
      - TZ=America/Sao_Paulo
      - JWT_SECRET=${JWT_SECRET}                 # OBRIGATORIO (defina no Portainer ou literal)
      - JWT_EXPIRES_IN=7d
      - RUN_SCHEDULER=false                      # NAO rodar ingestao no preview
      - DB_HOST=${DB_HOST}
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - CORS_ORIGINS=https://preview.br4licitacoes.com   # <-- dominio do PREVIEW (nao o de prod)
    networks:
      - Br4Net
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 768M
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        # Router/serviço com nome PROPRIO (newcrm) p/ nao colidir com os da producao.
        - traefik.http.routers.newcrm.rule=Host(`preview.br4licitacoes.com`)   # <-- dominio do PREVIEW
        - traefik.http.routers.newcrm.entrypoints=websecure
        - traefik.http.routers.newcrm.tls.certresolver=letsencryptresolver
        - traefik.http.routers.newcrm.service=newcrm
        - traefik.http.services.newcrm.loadbalancer.server.port=3001          # all-in-one escuta na 3001

networks:
  Br4Net:
    external: true
