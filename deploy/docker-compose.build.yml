# Build manual das 3 imagens (normalmente o CI faz isso a cada release).
#   cd deploy && docker compose -f docker-compose.build.yml build
#   docker login && docker compose -f docker-compose.build.yml push
# A api e o ingest-worker compartilham a mesma imagem crm-api.
services:
  web:
    image: ${REGISTRY:-guilherme1488}/crm-web:${TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
  api:
    image: ${REGISTRY:-guilherme1488}/crm-api:${TAG:-latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
  scrape-worker:
    image: ${REGISTRY:-guilherme1488}/crm-scrape-worker:${TAG:-latest}
    build:
      context: ..
      dockerfile: backend/scrape-worker/Dockerfile
