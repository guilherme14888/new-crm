server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Assets versionados (hash no nome) → cache longo e imutável.
  location /_expo/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA (expo-router): qualquer rota que não seja arquivo cai no index.html.
  # O /api NÃO chega aqui — o Traefik roteia /api para o serviço da API (prioridade).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
