name: Release & Publish

# A cada push na branch principal:
#   1. semantic-release lĂŞ os Conventional Commits e decide a prĂłxima versĂŁo
#      (featâ†’minor, fix/styleâ†’patch, BREAKING CHANGEâ†’major). 1Âş release = v1.0.0.
#   2. cria a tag git (vX.Y.Z), o GitHub Release e atualiza o CHANGELOG.
#   3. builda a imagem e publica no DockerHub como br4licitacoes/sistema:vX.Y.Z + :latest.
#
# Secrets necessĂˇrios (Settings â†’ Secrets and variables â†’ Actions):
#   DOCKERHUB_USERNAME  Â· usuĂˇrio/organizaĂ§ĂŁo do DockerHub
#   DOCKERHUB_TOKEN     Â· access token do DockerHub (Account Settings â†’ Security)
# (GITHUB_TOKEN Ă© injetado automaticamente pelo Actions.)

on:
  push:
    branches: [main, master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # criar tag, commit do changelog e release
      issues: write
      pull-requests: write
    steps:
      - name: Checkout (histĂłrico completo p/ o semantic-release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Instalar semantic-release
        run: >
          npm install --no-save
          semantic-release
          @semantic-release/commit-analyzer
          @semantic-release/release-notes-generator
          @semantic-release/changelog
          @semantic-release/exec
          @semantic-release/git
          @semantic-release/github

      - name: Release (versiona + builda + publica)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
