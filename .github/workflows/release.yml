name: Release & Publish

# A cada push na branch principal:
#   1. semantic-release (dry-run) calcula a PRÓXIMA versão pelos Conventional Commits
#      (feat→minor, fix/style→patch, BREAKING CHANGE→major). 1º release = v1.0.0.
#   2. builda e publica a imagem no DockerHub (guilherme1488/br4licitacoes:vX.Y.Z + :latest)
#      — log completo via docker/build-push-action.
#   3. só então finaliza o release (tag git vX.Y.Z + GitHub Release + CHANGELOG),
#      garantindo que um build quebrado NÃO deixe tag órfã.
#
# Secrets necessários (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  · usuário/organização do DockerHub
#   DOCKERHUB_TOKEN     · access token do DockerHub (Account Settings → Security)
# (GITHUB_TOKEN é injetado automaticamente pelo Actions.)

on:
  push:
    branches: [main, master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # criar tag, commit do changelog e release
      issues: write
      pull-requests: write
    steps:
      - name: Checkout (histórico completo p/ o semantic-release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar semantic-release
        run: >
          npm install --no-save
          semantic-release
          @semantic-release/commit-analyzer
          @semantic-release/release-notes-generator
          @semantic-release/changelog
          @semantic-release/git
          @semantic-release/github

      - name: Calcular próxima versão (dry-run)
        id: ver
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          npx semantic-release --dry-run > sr.log 2>&1
          cat sr.log
          # 1º release: "There is no previous release, the next release version is X.Y.Z"
          # demais:     "The next release version is X.Y.Z"  → grep case-insensitive cobre ambos
          V=$(grep -oiP 'next release version is \K[0-9]+\.[0-9]+\.[0-9]+' sr.log | head -1)
          if [ -n "$V" ]; then
            echo "released=true"  >> "$GITHUB_OUTPUT"
            echo "version=$V"     >> "$GITHUB_OUTPUT"
            echo "→ próxima versão: v$V"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "→ nenhum release necessário para estes commits."
          fi

      - name: Setup Docker Buildx
        if: steps.ver.outputs.released == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login no DockerHub
        if: steps.ver.outputs.released == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push da imagem (única — legado, ainda funciona)
        if: steps.ver.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            guilherme1488/br4licitacoes:v${{ steps.ver.outputs.version }}
            guilherme1488/br4licitacoes:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy separado (4 serviços): 3 imagens ─────────────────────────────
      - name: Build & push — crm-web (SPA nginx)
        if: steps.ver.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: true
          platforms: linux/amd64
          tags: |
            guilherme1488/crm-web:v${{ steps.ver.outputs.version }}
            guilherme1488/crm-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — crm-api (backend)
        if: steps.ver.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            guilherme1488/crm-api:v${{ steps.ver.outputs.version }}
            guilherme1488/crm-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — crm-scrape-worker (Playwright)
        if: steps.ver.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/scrape-worker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            guilherme1488/crm-scrape-worker:v${{ steps.ver.outputs.version }}
            guilherme1488/crm-scrape-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Finalizar release (tag + GitHub Release + changelog)
        if: steps.ver.outputs.released == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
