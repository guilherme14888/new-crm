name: Build & Publish (new-crm)

# Repo ISOLADO do redesign. A cada push na branch principal: builda e publica UMA
# imagem all-in-one em guilherme1488/new-crm (:latest + :<sha>). SEM semantic-release
# (sem commit de changelog / tags) — evita conflito de tag e o "erro no commit".
# NUNCA usa os nomes de imagem de producao do crm-br4 (crm-web/crm-api/...).
#
# Secrets necessarios (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  · usuario do DockerHub
#   DOCKERHUB_TOKEN     · access token do DockerHub

on:
  push:
    branches: [main, master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push — imagem unica (guilherme1488/new-crm)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            guilherme1488/new-crm:latest
            guilherme1488/new-crm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
