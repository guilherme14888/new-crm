name: Release & Publish

# A cada push na branch principal:
#   1. semantic-release (dry-run) calcula a PRĂ“XIMA versĂ£o pelos Conventional Commits
#      (featâ†’minor, fix/styleâ†’patch, BREAKING CHANGEâ†’major). 1Âº release = v1.0.0.
#   2. builda e publica UMA imagem no DockerHub (guilherme1488/new-crm:vX.Y.Z + :latest)
#      â€” repo ISOLADO do redesign; NUNCA toca as imagens de producao do crm-br4.
#   3. sĂ³ entĂ£o finaliza o release (tag git vX.Y.Z + GitHub Release + CHANGELOG),
#      garantindo que um build quebrado NĂƒO deixe tag Ă³rfĂ£.
#
# Secrets necessĂ¡rios (Settings â†’ Secrets and variables â†’ Actions):
#   DOCKERHUB_USERNAME  Â· usuĂ¡rio/organizaĂ§Ă£o do DockerHub
#   DOCKERHUB_TOKEN     Â· access token do DockerHub (Account Settings â†’ Security)
# (GITHUB_TOKEN Ă© injetado automaticamente pelo Actions.)

on:
  push:
    branches: [main, master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # criar tag, commit do changelog e release
      issues: write
      pull-requests: write
    steps:
      - name: Checkout (histĂ³rico completo p/ o semantic-release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar semantic-release
        run: >
          npm install --no-save
          semantic-release
          @semantic-release/commit-analyzer
          @semantic-release/release-notes-generator
          @semantic-release/changelog
          @semantic-release/git
          @semantic-release/github

      - name: Calcular prĂ³xima versĂ£o (dry-run)
        id: ver
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          npx semantic-release --dry-run > sr.log 2>&1
          cat sr.log
          # 1Âº release: "There is no previous release, the next release version is X.Y.Z"
          # demais:     "The next release version is X.Y.Z"  â†’ grep case-insensitive cobre ambos
          V=$(grep -oiP 'next release version is \K[0-9]+\.[0-9]+\.[0-9]+' sr.log | head -1)
          if [ -n "$V" ]; then
            echo "released=true"  >> "$GITHUB_OUTPUT"
            echo "version=$V"     >> "$GITHUB_OUTPUT"
            echo "â†’ prĂ³xima versĂ£o: v$V"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "â†’ nenhum release necessĂ¡rio para estes commits."
          fi

      - name: Setup Docker Buildx
        if: steps.ver.outputs.released == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login no DockerHub
        if: steps.ver.outputs.released == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # â”€â”€ REPO new-crm: publica UMA imagem (all-in-one) em guilherme1488/new-crm.
      #    NUNCA usar os nomes de producao (crm-web/crm-api/...) aqui â€” este repo e
      #    isolado p/ o redesign e nao deve tocar a producao do crm-br4.
      - name: Build & push â€” imagem unica (guilherme1488/new-crm)
        if: steps.ver.outputs.released == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            guilherme1488/new-crm:v${{ steps.ver.outputs.version }}
            guilherme1488/new-crm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Finalizar release (tag + GitHub Release + changelog)
        if: steps.ver.outputs.released == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
