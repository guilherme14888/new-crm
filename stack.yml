# ════════════════════════════════════════════════════════════════════════════
#  Stack Docker Swarm — Sistema BR4 Licitações  (guilherme1488/br4licitacoes)
#
#  COMO SUBIR NO PORTAINER:
#   1. Portainer → Stacks → Add stack → Name: br4-sistema
#   2. Build method: Web editor → cole TODO este arquivo.
#   3. Role até "Environment variables" → Add an environment variable e crie:
#        DB_HOST       = host/serviço do seu MariaDB   (ex.: mariadb)
#        DB_USER       = usuário do banco              (ex.: crm)
#        DB_PASSWORD   = senha do banco
#        DB_NAME       = nome do banco                 (ex.: crmbr4)
#        JWT_SECRET    = um segredo longo e aleatório  (ver dica abaixo)
#   4. Se a rede do seu Traefik NÃO se chama "network_public", edite o nome no
#      bloco `networks:` lá no fim do arquivo (confira com: docker network ls).
#   5. Deploy the stack.
#
#  Pré-requisitos do ambiente:
#   - Traefik no swarm com entrypoint `websecure` e certresolver `letsencryptresolver`
#     (mesmo padrão do seu n8n) e conectado à rede overlay externa abaixo.
#   - MariaDB EXTERNO já existente, acessível pela rede do serviço, JÁ POPULADO.
#   - DNS: registro A de `sistema.br4licitacoes.com` → IP do swarm.
#
#  Dica p/ gerar o JWT_SECRET:  openssl rand -hex 32
#  Imagem privada no DockerHub? Cadastre o registry em Portainer → Registries
#  (ou deixe o repositório público) para o swarm conseguir puxar a imagem.
# ════════════════════════════════════════════════════════════════════════════
version: "3.8"

services:
  sistema:
    # Fixe uma versão para reprodutibilidade (ex.: :v1.0.0) ou use :latest.
    image: guilherme1488/br4licitacoes:latest
    environment:
      - PORT=3001
      - WEB_DIR=/app/backend/public
      - TZ=America/Sao_Paulo        # apenas p/ logs em horário de Brasília (o agendamento já é 9h BRT por cálculo)

      # ── Banco de dados (MariaDB externo) — defina no painel do Portainer ───
      - DB_HOST=${DB_HOST}
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}

      # ── Autenticação — defina no painel do Portainer ──────────────────────
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d

      # ── Ingestão roda no WORKER isolado (serviço ingest-worker abaixo) ────
      # Desliga o agendador aqui p/ não disputar CPU/conexões com a API.
      - RUN_SCHEDULER=false

    networks:
      - network_public

    deploy:
      mode: replicated
      replicas: 1
      update_config:
        order: start-first       # sobe a nova versão antes de derrubar a antiga (zero-downtime)
        failure_action: rollback
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 1024M
      labels:
        - traefik.enable=true
        - traefik.http.routers.br4_sistema.rule=Host(`sistema.br4licitacoes.com`) ## URL do Sistema
        - traefik.http.routers.br4_sistema.entrypoints=websecure
        - traefik.http.routers.br4_sistema.priority=10
        - traefik.http.routers.br4_sistema.tls.certresolver=letsencryptresolver
        - traefik.http.routers.br4_sistema.service=br4_sistema
        - traefik.http.services.br4_sistema.loadbalancer.server.port=3001
        - traefik.http.services.br4_sistema.loadbalancer.passHostHeader=1

  # ── Worker isolado de ingestão (MESMA imagem, sem HTTP, sem Traefik) ────────
  # Roda só o agendador (catch-up no boot + diário às 9h BRT). Mantenha 1 réplica.
  ingest-worker:
    image: guilherme1488/br4licitacoes:latest
    command: node src/jobs/worker.js
    # IMPORTANTE: o worker NÃO sobe HTTP, então o healthcheck da imagem (GET /health)
    # falharia sempre e o Swarm mataria o container (SIGTERM) em loop. Desabilite-o:
    healthcheck:
      test: ["NONE"]
    environment:
      - TZ=America/Sao_Paulo
      # Banco (mesmas variáveis do painel do Portainer)
      - DB_HOST=${DB_HOST}
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      # Ingestão
      - INGEST_ENABLED=true
      - INGEST_HOUR_BRT=9
      - INGEST_PAGES=10
      - INGEST_CATCHUP_ON_BOOT=true
      - INGEST_MAX_BACKFILL_DAYS=14
      # ── (Opcional) Filtro de relevância por IA / credenciais de portais ───
      # - INGEST_AI_RELEVANCE=true
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - LICITAJA_API_KEY=${LICITAJA_API_KEY}
    networks:
      - network_public
    deploy:
      mode: replicated
      replicas: 1               # NUNCA aumente: agendador in-process → rodaria duplicado
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M

networks:
  network_public:
    external: true
    name: network_public        # ← troque aqui se a rede do seu Traefik tiver outro nome
